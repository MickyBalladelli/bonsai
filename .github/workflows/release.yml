name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-latest
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test
      - name: Build release binary
        run: cargo build --release
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/contextshrink "dist/contextshrink-${{ matrix.name }}"
          chmod +x "dist/contextshrink-${{ matrix.name }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextshrink-${{ matrix.name }}
          path: dist/contextshrink-${{ matrix.name }}

  vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: copilot/contextshrink-vscode/package-lock.json
      - name: Install extension dependencies
        run: npm ci
        working-directory: copilot/contextshrink-vscode
      - name: Compile extension
        run: npm run compile
        working-directory: copilot/contextshrink-vscode
      - name: Package VSIX
        run: npm run package
        working-directory: copilot/contextshrink-vscode
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextshrink-vscode-vsix
          path: copilot/contextshrink-vscode/contextshrink-vscode-*.vsix

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - binaries
      - vsix
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
