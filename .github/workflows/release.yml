name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            name: macos-arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Test
        run: cargo test
      - name: Build release binary
        run: cargo build --release --target "${{ matrix.target }}"
      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/contextshrink" "dist/contextshrink-${{ matrix.name }}"
          chmod +x "dist/contextshrink-${{ matrix.name }}"
          shasum -a 256 "dist/contextshrink-${{ matrix.name }}" > "dist/contextshrink-${{ matrix.name }}.sha256"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextshrink-${{ matrix.name }}
          path: |
            dist/contextshrink-${{ matrix.name }}
            dist/contextshrink-${{ matrix.name }}.sha256

  vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: copilot/contextshrink-vscode/package-lock.json
      - name: Install extension dependencies
        run: npm ci
        working-directory: copilot/contextshrink-vscode
      - name: Compile extension
        run: npm run compile
        working-directory: copilot/contextshrink-vscode
      - name: Package VSIX
        run: npm run package
        working-directory: copilot/contextshrink-vscode
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextshrink-vscode-vsix
          path: copilot/contextshrink-vscode/contextshrink-vscode-*.vsix

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - binaries
      - vsix
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Write release notes
        run: |
          cat > release-notes.md <<'NOTES'
          ## Install without Rust

          macOS Apple Silicon:

          ```sh
          curl -L -o contextshrink https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/contextshrink-macos-arm64
          chmod +x contextshrink
          ./contextshrink --version
          ```

          Linux x64:

          ```sh
          curl -L -o contextshrink https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/contextshrink-linux-x64
          chmod +x contextshrink
          ./contextshrink --version
          ```

          Then run it in a repo:

          ```sh
          ./contextshrink . --prompt --output clipboard
          ```

          SHA-256 checksum files are attached beside each binary.
          NOTES
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
